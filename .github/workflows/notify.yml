name: YouTube Discord Notifier

on:
  schedule:
    - cron: "*/30 * * * *"  # 30분마다 실행
  workflow_dispatch:         # 수동 실행 허용

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # seen_videos.json 커밋을 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache EasyOCR models
        uses: actions/cache@v4
        with:
          path: ~/.EasyOCR
          key: easyocr-ko-v1

      - name: Install system dependencies
        run: sudo apt-get install -y libgl1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notifier
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: python groq_bot.py

      - name: Commit seen_videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_videos.json
          git diff --cached --quiet || git commit -m "chore: update seen_videos.json [skip ci]"
          git push
