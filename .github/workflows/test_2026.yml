name: Test — 2026 Videos by Month

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup YouTube cookies (optional)
        run: |
          if [ -n "$YOUTUBE_COOKIES_B64" ]; then
            echo "$YOUTUBE_COOKIES_B64" | base64 -d > cookies.txt
            echo "쿠키 파일 생성됨"
          fi
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}

      - name: Run 2026 test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python test_2026.py
